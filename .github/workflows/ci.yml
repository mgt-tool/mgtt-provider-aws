name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: go vet
        run: go vet ./...
      - name: gofmt
        run: |
          diff=$(gofmt -s -d .)
          if [ -n "$diff" ]; then
            echo "$diff"
            echo "::error::gofmt found issues"
            exit 1
          fi

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: unit tests
        run: go test -race -count=1 ./...

  integration-localstack:
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:3.6
        ports:
          - 4566:4566
        env:
          SERVICES: s3,iam,ssm,ec2,acm
          DEFAULT_REGION: us-east-1
          DEBUG: "0"
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30
    env:
      AWS_ENDPOINT_URL: http://localhost:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install aws CLI v2
        run: |
          set -euo pipefail
          if ! command -v aws >/dev/null; then
            curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install --update
          fi
          aws --version
      - name: Wait for LocalStack
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:4566/_localstack/health >/dev/null; then
              echo "LocalStack ready"
              exit 0
            fi
            sleep 2
          done
          echo "LocalStack did not become healthy in time" >&2
          exit 1
      - name: Seed fixtures
        working-directory: test/integration
        run: bash seed-localstack.sh
      - name: Integration tests against LocalStack
        run: |
          set -a
          . test/integration/fixtures.env
          set +a
          go test -tags=integration -v -run 'TestLocalStack_Probes|TestYAMLTypesAllRegistered' ./test/integration/...
