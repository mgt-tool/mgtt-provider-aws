meta:
  name: aws
  version: 0.2.0
  description: AWS resources for mgtt — RDS database instances via aws-cli
  tags: [databases, cloud, aws]
  requires:
    mgtt: ">=0.1.0"
  command: "$MGTT_PROVIDER_DIR/bin/mgtt-provider-aws"

# Capabilities the provider needs at probe time. Image installs
# satisfy these via docker-run bind mounts and env forwards; git
# installs inherit them from the operator's shell.
# See mgtt docs/reference/image-capabilities.md for the vocabulary.
needs: [aws, network]

hooks:
  install: hooks/install.sh
  uninstall: hooks/uninstall.sh

auth:
  strategy: environment
  reads_from:
    - AWS_PROFILE
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_SESSION_TOKEN
    - ~/.aws/credentials
    - ~/.aws/config
    - instance-profile
  access:
    probes: AWS API read-only
    writes: none
