meta:
  name: aws
  version: 0.2.0
  description: AWS resources for mgtt — RDS database instances via aws-cli
  tags: [databases, cloud, aws]
  requires:
    mgtt: ">=0.1.0"
  command: "$MGTT_PROVIDER_DIR/bin/mgtt-provider-aws"

# Capabilities the image-installed form of this provider needs mgtt to
# forward at probe time. Surfaced here (at the top, before types and
# vocabulary) so anyone reading this file sees the runtime scope first.
# See mgtt docs/reference/image-capabilities.md for the full vocabulary.
image:
  needs: [aws, network]

hooks:
  install: hooks/install.sh
  uninstall: hooks/uninstall.sh

auth:
  strategy: environment
  reads_from:
    - AWS_PROFILE
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_SESSION_TOKEN
    - ~/.aws/credentials
    - ~/.aws/config
    - instance-profile
  access:
    probes: AWS API read-only
    writes: none
