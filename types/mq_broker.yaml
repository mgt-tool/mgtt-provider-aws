description: AWS MQ broker (RabbitMQ or ActiveMQ). Facts are observed via `aws mq describe-broker` and CloudWatch metrics.

# IAM grants required to probe this type. mgtt-core doesn't parse this
# block today; it's operator-facing documentation for scoping a
# probe-role policy. `{region}` / `{account}` / `{resource}` reference
# the target's coordinates — substitute before pasting into a policy.
requires:
  iam:
    - action: mq:DescribeBroker
      resource: "arn:aws:mq:{region}:{account}:broker:{resource}"
    - action: cloudwatch:GetMetricStatistics
      resource: "*"
      note: "CloudWatch metric reads do not support resource-scoped policies."

facts:
  available:
    type: mgtt.bool
    ttl: 60s
    cost: low
    access: AWS API read-only
  queue_depth:
    type: mgtt.int
    ttl: 60s
    cost: low
    access: AWS API read-only
  consumer_count:
    type: mgtt.int
    ttl: 60s
    cost: low
    access: AWS API read-only

healthy:
  - available == true
  - queue_depth < 10000
  - consumer_count > 0

states:
  live:
    when: "available == true"
    description: broker accepting publishers and consumers
  stopped:
    when: "available == false"
    description: broker unreachable

default_active_state: live

failure_modes:
  stopped:
    can_cause: [publish_failure, consumer_disconnect, message_backlog]
