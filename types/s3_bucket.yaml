description: AWS S3 bucket. Facts are observed via `aws s3api head-bucket`, `aws s3api get-bucket-versioning`, and CloudWatch storage metrics.

# IAM grants required to probe this type. mgtt-core doesn't parse this
# block today; it's operator-facing documentation for scoping a
# probe-role policy. `{resource}` is the bucket name — substitute
# before pasting into a policy.
requires:
  iam:
    - action: s3:ListBucket
      resource: "arn:aws:s3:::{resource}"
      note: "s3:ListBucket gates the HEAD /bucket call used for `accessible`."
    - action: s3:GetBucketVersioning
      resource: "arn:aws:s3:::{resource}"
    - action: cloudwatch:GetMetricStatistics
      resource: "*"
      note: "Storage-metrics fact (object_count). CloudWatch metric reads do not support resource-scoped policies."

facts:
  accessible:
    type: mgtt.bool
    ttl: 300s
    cost: low
    access: AWS API read-only
  versioning_enabled:
    type: mgtt.bool
    ttl: 3600s
    cost: low
    access: AWS API read-only
  object_count:
    type: mgtt.int
    ttl: 3600s
    cost: low
    access: AWS API read-only

healthy:
  - accessible == true

states:
  live:
    when: "accessible == true"
    description: bucket reachable and responding
  inaccessible:
    when: "accessible == false"
    description: bucket unreachable or permission denied

default_active_state: live

failure_modes:
  inaccessible:
    can_cause: [upload_failure, download_failure, access_denied]
