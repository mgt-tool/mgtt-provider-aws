description: AWS VPC security group. Facts are observed via `aws ec2 describe-security-groups`.

# IAM grants required to probe this type. mgtt-core doesn't parse this
# block today; it's operator-facing documentation for scoping a
# probe-role policy.
requires:
  iam:
    - action: ec2:DescribeSecurityGroups
      resource: "*"
      note: "ec2:Describe* actions do not support resource-scoped policies."

facts:
  exists:
    type: mgtt.bool
    ttl: 300s
    cost: low
    access: AWS API read-only
  ingress_rule_count:
    type: mgtt.int
    ttl: 300s
    cost: low
    access: AWS API read-only
  egress_rule_count:
    type: mgtt.int
    ttl: 300s
    cost: low
    access: AWS API read-only

healthy:
  - exists == true

states:
  present:
    when: "exists == true"
    description: security group exists
  absent:
    when: "exists == false"
    description: security group not found

default_active_state: present

failure_modes:
  absent:
    can_cause: [connection_refused, instance_launch_failure]
