description: AWS Systems Manager Parameter Store parameter (String, StringList, or SecureString). Facts are observed via `aws ssm get-parameter` and `aws ssm describe-parameters`.

# IAM grants required to probe this type. mgtt-core doesn't parse this
# block today; it's operator-facing documentation for scoping a
# probe-role policy. `{region}` / `{account}` / `{resource}` reference
# the target's coordinates — substitute before pasting into a policy.
# Note: the parameter name begins with `/`; the ARN suffix is
# `parameter{resource}` — no extra separator is inserted.
requires:
  iam:
    - action: ssm:GetParameter
      resource: "arn:aws:ssm:{region}:{account}:parameter{resource}"
    - action: ssm:DescribeParameters
      resource: "*"
      note: "ssm:DescribeParameters only supports resource-scoping via tag-based conditions; grant at `*` or attach an aws:ResourceTag condition."

facts:
  exists:
    type: mgtt.bool
    ttl: 60s
    cost: low
    access: AWS API read-only
  version:
    type: mgtt.int
    ttl: 60s
    cost: low
    access: AWS API read-only
  last_modified_age_seconds:
    type: mgtt.int
    ttl: 60s
    cost: low
    access: AWS API read-only

healthy:
  - exists == true

states:
  present:
    when: "exists == true"
    description: parameter set
  absent:
    when: "exists == false"
    description: parameter not found

default_active_state: present

failure_modes:
  absent:
    can_cause: [config_load_failure, secret_missing, external_secrets_sync_failure]
