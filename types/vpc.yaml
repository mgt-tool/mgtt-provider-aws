description: AWS VPC. Facts are observed via `aws ec2 describe-vpcs` and `aws ec2 describe-network-interfaces` for IP utilization.

# IAM grants required to probe this type. mgtt-core doesn't parse this
# block today; it's operator-facing documentation for scoping a
# probe-role policy.
requires:
  iam:
    - action: ec2:DescribeVpcs
      resource: "*"
      note: "ec2:Describe* actions do not support resource-scoped policies."
    - action: ec2:DescribeNetworkInterfaces
      resource: "*"

facts:
  available:
    type: mgtt.bool
    ttl: 300s
    cost: low
    access: AWS API read-only
  ip_utilization:
    type: mgtt.percentage
    ttl: 300s
    cost: low
    access: AWS API read-only

healthy:
  - available == true
  - ip_utilization < 80

states:
  live:
    when: "available == true"
    description: VPC available
  unavailable:
    when: "available == false"
    description: VPC unavailable

default_active_state: live

failure_modes:
  unavailable:
    can_cause: [network_unreachable, eni_allocation_failure]
